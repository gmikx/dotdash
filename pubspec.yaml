name: dotdash
description: "DotDash - Learn Morse Code"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  shared_preferences: ^2.3.4
  vibration: ^2.0.1
  gap: ^3.0.1
  audioplayers: ^6.5.1
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#121212" # Dark background to match icon
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  min_sdk_android: 21
